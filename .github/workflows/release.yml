name: Release

on:
  push:
    tags:
      - 'v*.*.*'

# A release is a destructive, shared-state operation — only one at a time.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm and create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # Required for `npm publish --provenance` and for `gh release create`.
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        # Guards against publishing a tag whose semver does not match the
        # version committed to package.json — a mismatch always indicates
        # a broken release and would otherwise ship the wrong metadata.
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Verify (typecheck · lint · test · build)
        run: pnpm prepublishOnly

      - name: Publish to npm with provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm publish --provenance --no-git-checks

      - name: Extract release notes from CHANGELOG
        # Pulls the section for the current tag out of CHANGELOG.md so the
        # GitHub Release body stays in sync with the changelog. Falls back
        # to "See CHANGELOG.md" when the section is not found.
        id: changelog
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NOTES=$(awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](./CHANGELOG.md) for details."
          fi
          {
            echo 'notes<<EOF'
            echo "$NOTES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "${{ steps.changelog.outputs.notes }}"
